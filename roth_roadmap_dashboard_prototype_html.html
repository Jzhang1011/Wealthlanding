<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roth Roadmap Dashboard Prototype</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-white text-slate-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useState } = React;

    function money(n) {
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 0,
      }).format(Number.isFinite(n) ? n : 0);
    }

    function compact(n) {
      return new Intl.NumberFormat("en-US", {
        notation: "compact",
        maximumFractionDigits: 1,
      }).format(Number.isFinite(n) ? n : 0);
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    const INITIAL = {
      currentAge: 45,
      spouseAge: 45,
      retireAge: 51,
      taxable: 1700000,
      pretax: 1900000,
      roth: 200000,
      hsa: 50000,
      annualSpend: 100000,
      reducedSpend: 45000,
      reductionAge: 58,
      passiveIncome: 55000,
      businessIncome: 50000,
      annualReturn: 7.5,
      inflation: 3,
      ssAge: 67,
      ssMonthly: 7000,
      householdSize: 5,
      preserveAca: true,
      useTaxableForConversionTax: true,
      abroadStartAge: 52,
      abroadYears: 5,
      abroadMode: false,
      collegeStart1: 51,
      collegeStart2: 51,
      collegeStart3: 55,
      collegeAnnualCost: 150000,
      conversionStrategy: "balanced",
    };

    function acaThreshold(size) {
      const map = { 2: 108200, 3: 136600, 4: 165000, 5: 193400, 6: 221800 };
      return map[size] ?? 193400 + Math.max(0, size - 5) * 28400;
    }

    function taxBracketCeiling(income) {
      if (income < 120000) return { ceiling: 130000, bracket: "12%" };
      if (income < 240000) return { ceiling: 240000, bracket: "22%–24%" };
      if (income < 420000) return { ceiling: 420000, bracket: "32%" };
      return { ceiling: 700000, bracket: "35%–37%" };
    }

    function yearsAbroadSet(age, abroadStartAge, abroadYears) {
      return age >= abroadStartAge && age < abroadStartAge + abroadYears;
    }

    function householdSizeForAge(age, base) {
      if (age >= 61) return Math.max(2, base - 3);
      if (age >= 57) return Math.max(3, base - 2);
      return base;
    }

    function collegeCostForAge(age, annualCost, starts) {
      return starts.reduce((sum, start) => {
        if (age >= start && age < start + 4) return sum + annualCost;
        return sum;
      }, 0);
    }

    function buildRoadmap(inputs) {
      const rows = [];
      let taxable = inputs.taxable;
      let pretax = inputs.pretax;
      let roth = inputs.roth;
      const r = inputs.annualReturn / 100;
      const infl = inputs.inflation / 100;
      const startYear = new Date().getFullYear();

      for (let y = 0; y < 40; y++) {
        const age = inputs.currentAge + y;
        const year = startYear + y;
        const abroadThisYear = inputs.abroadMode && yearsAbroadSet(age, inputs.abroadStartAge, inputs.abroadYears);
        const hh = householdSizeForAge(age, inputs.householdSize);
        const acaCap = abroadThisYear ? null : acaThreshold(hh);
        const spendBase = age >= inputs.reductionAge ? inputs.reducedSpend : inputs.annualSpend;
        const spend = spendBase * Math.pow(1 + infl, y);
        const college = collegeCostForAge(
          age,
          inputs.collegeAnnualCost * Math.pow(1 + infl, y),
          [inputs.collegeStart1, inputs.collegeStart2, inputs.collegeStart3]
        );
        const business = age >= inputs.retireAge
          ? inputs.businessIncome * Math.pow(1 + infl, Math.max(0, y - (inputs.retireAge - inputs.currentAge)))
          : inputs.businessIncome;
        const passive = inputs.passiveIncome * Math.pow(1 + infl, y);
        const ss = age >= inputs.ssAge ? inputs.ssMonthly * 12 * Math.pow(1 + infl, y) : 0;
        const baseMagi = passive + business + ss;
        const acaSafeMax = acaCap ? Math.max(0, acaCap - baseMagi - 10000) : null;
        const bracketInfo = taxBracketCeiling(baseMagi);
        const bracketMax = Math.max(0, bracketInfo.ceiling - baseMagi);

        let recommended = 0;
        if (inputs.conversionStrategy === "aca") {
          recommended = acaSafeMax ?? Math.min(bracketMax, pretax);
        } else if (inputs.conversionStrategy === "max") {
          recommended = Math.min(bracketMax, pretax);
          if (abroadThisYear) recommended = Math.min(pretax, Math.max(recommended, 250000));
        } else {
          const balancedTarget = abroadThisYear ? 200000 : 140000;
          const constraint = inputs.preserveAca && !abroadThisYear && acaSafeMax !== null
            ? Math.min(balancedTarget, acaSafeMax)
            : Math.min(balancedTarget, bracketMax);
          recommended = Math.min(pretax, Math.max(0, constraint));
        }

        const taxRate = bracketInfo.bracket === "12%"
          ? 0.12
          : bracketInfo.bracket === "22%–24%"
            ? 0.24
            : bracketInfo.bracket === "32%"
              ? 0.32
              : 0.37;
        const conversionTax = recommended * taxRate;

        taxable *= 1 + (r - 0.006);
        pretax *= 1 + r;
        roth *= 1 + r;

        pretax = Math.max(0, pretax - recommended);
        roth += recommended;
        if (inputs.useTaxableForConversionTax) {
          taxable -= conversionTax;
        } else {
          pretax = Math.max(0, pretax - conversionTax);
        }

        const netNeed = Math.max(0, spend + college - (passive + business + ss));
        taxable -= netNeed;

        rows.push({
          year,
          age,
          abroad: abroadThisYear ? "Abroad" : "US",
          household: hh,
          acaSafeMax,
          bracketMax,
          bracket: bracketInfo.bracket,
          recommended,
          spend,
          college,
          passive,
          business,
          ss,
          taxable: Math.max(0, taxable),
          pretax: Math.max(0, pretax),
          roth: Math.max(0, roth),
          note: abroadThisYear
            ? "Abroad mode widens conversion flexibility."
            : (acaSafeMax !== null && recommended >= acaSafeMax - 5000
                ? "ACA is likely the binding constraint."
                : "Tax bracket is likely the main conversion limit."),
        });
      }
      return rows;
    }

    function runSelfTests() {
      const base = buildRoadmap(INITIAL);
      console.assert(Array.isArray(base) && base.length === 40, "Roadmap should return 40 annual rows.");
      console.assert(base[0].year <= base[39].year, "Years should be ascending.");
      console.assert(base.every((r) => r.pretax >= 0 && r.roth >= 0 && r.taxable >= 0), "Balances should not be negative after clamping.");
      const abroad = buildRoadmap({ ...INITIAL, abroadMode: true, abroadStartAge: 52, abroadYears: 5, conversionStrategy: "max" });
      const abroadWindow = abroad.filter((r) => r.age >= 52 && r.age < 57);
      console.assert(abroadWindow.some((r) => r.abroad === "Abroad"), "Abroad rows should be flagged during abroad years.");
      const ss62 = buildRoadmap({ ...INITIAL, ssAge: 62 });
      const ss70 = buildRoadmap({ ...INITIAL, ssAge: 70 });
      console.assert(ss62.some((r) => r.ss > 0) && ss70.some((r) => r.ss > 0), "SS scenarios should create SS income.");
    }
    runSelfTests();

    function Card({ title, value, subtitle }) {
      return (
        <div className="rounded-3xl border border-slate-200 shadow-sm p-5 bg-white">
          <div className="text-sm text-slate-500">{title}</div>
          <div className="text-2xl font-semibold mt-1">{value}</div>
          <div className="text-xs text-slate-500 mt-2">{subtitle}</div>
        </div>
      );
    }

    function NumberInput({ label, value, onChange }) {
      return (
        <label className="block space-y-2">
          <span className="text-sm font-medium text-slate-700">{label}</span>
          <input
            type="number"
            value={value}
            onChange={(e) => onChange(Number(e.target.value))}
            className="w-full rounded-xl border border-slate-300 px-3 py-2"
          />
        </label>
      );
    }

    function Toggle({ label, checked, onChange }) {
      return (
        <label className="flex items-center justify-between gap-3 rounded-2xl border border-slate-200 p-3 cursor-pointer">
          <span className="text-sm font-medium">{label}</span>
          <input type="checkbox" checked={checked} onChange={(e) => onChange(e.target.checked)} />
        </label>
      );
    }

    function SimpleLineChart({ data, series, xKey, height = 340, yFormatter = compact }) {
      const width = 960;
      const pad = { top: 20, right: 20, bottom: 30, left: 60 };
      const plotW = width - pad.left - pad.right;
      const plotH = height - pad.top - pad.bottom;
      const validData = data || [];
      const yValues = validData.flatMap((row) => series.map((s) => Number(row[s.key] ?? 0)).filter(Number.isFinite));
      const maxY = Math.max(1, ...yValues);
      const minY = 0;
      const colors = ["#0f172a", "#2563eb", "#16a34a", "#9333ea"];

      function xPos(index) {
        if (validData.length <= 1) return pad.left;
        return pad.left + (index / (validData.length - 1)) * plotW;
      }
      function yPos(value) {
        return pad.top + plotH - ((value - minY) / (maxY - minY)) * plotH;
      }
      function pathFor(key) {
        return validData.map((row, i) => `${i === 0 ? "M" : "L"}${xPos(i)},${yPos(Number(row[key] ?? 0))}`).join(" ");
      }

      return (
        <div className="w-full overflow-x-auto">
          <svg viewBox={`0 0 ${width} ${height}`} className="w-full min-w-[760px]">
            <rect x="0" y="0" width={width} height={height} fill="white" />
            {[0, 0.25, 0.5, 0.75, 1].map((t, i) => {
              const y = pad.top + plotH * t;
              const val = maxY * (1 - t);
              return (
                <g key={i}>
                  <line x1={pad.left} x2={pad.left + plotW} y1={y} y2={y} stroke="#e2e8f0" />
                  <text x={pad.left - 10} y={y + 4} textAnchor="end" fontSize="12" fill="#64748b">{yFormatter(val)}</text>
                </g>
              );
            })}
            <line x1={pad.left} x2={pad.left} y1={pad.top} y2={pad.top + plotH} stroke="#94a3b8" />
            <line x1={pad.left} x2={pad.left + plotW} y1={pad.top + plotH} y2={pad.top + plotH} stroke="#94a3b8" />
            {validData.map((row, i) => (
              <text key={i} x={xPos(i)} y={pad.top + plotH + 18} textAnchor="middle" fontSize="12" fill="#64748b">
                {row[xKey]}
              </text>
            ))}
            {series.map((s, idx) => (
              <g key={s.key}>
                <path d={pathFor(s.key)} fill="none" stroke={colors[idx % colors.length]} strokeWidth="3" strokeDasharray={s.dashed ? "6 6" : undefined} />
              </g>
            ))}
          </svg>
          <div className="flex flex-wrap gap-4 mt-3 text-sm text-slate-600">
            {series.map((s, idx) => (
              <div key={s.key} className="flex items-center gap-2">
                <span className="inline-block w-4 h-1.5 rounded" style={{ background: colors[idx % colors.length] }}></span>
                <span>{s.label}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function SimpleBarChart({ data, bars, xKey, height = 320, yFormatter = compact }) {
      const width = 960;
      const pad = { top: 20, right: 20, bottom: 30, left: 60 };
      const plotW = width - pad.left - pad.right;
      const plotH = height - pad.top - pad.bottom;
      const validData = data || [];
      const yValues = validData.flatMap((row) => bars.map((b) => Number(row[b.key] ?? 0)).filter(Number.isFinite));
      const maxY = Math.max(1, ...yValues);
      const colors = ["#0f172a", "#2563eb", "#16a34a", "#9333ea"];
      const categoryWidth = validData.length ? plotW / validData.length : plotW;
      const innerGap = 10;
      const totalBarWidth = Math.max(14, categoryWidth - innerGap);
      const oneBarWidth = Math.max(10, totalBarWidth / Math.max(1, bars.length) - 6);
      function yPos(value) {
        return pad.top + plotH - (value / maxY) * plotH;
      }

      return (
        <div className="w-full overflow-x-auto">
          <svg viewBox={`0 0 ${width} ${height}`} className="w-full min-w-[760px]">
            <rect x="0" y="0" width={width} height={height} fill="white" />
            {[0, 0.25, 0.5, 0.75, 1].map((t, i) => {
              const y = pad.top + plotH * t;
              const val = maxY * (1 - t);
              return (
                <g key={i}>
                  <line x1={pad.left} x2={pad.left + plotW} y1={y} y2={y} stroke="#e2e8f0" />
                  <text x={pad.left - 10} y={y + 4} textAnchor="end" fontSize="12" fill="#64748b">{yFormatter(val)}</text>
                </g>
              );
            })}
            <line x1={pad.left} x2={pad.left} y1={pad.top} y2={pad.top + plotH} stroke="#94a3b8" />
            <line x1={pad.left} x2={pad.left + plotW} y1={pad.top + plotH} y2={pad.top + plotH} stroke="#94a3b8" />
            {validData.map((row, i) => {
              const categoryX = pad.left + i * categoryWidth + innerGap / 2;
              return (
                <g key={String(row[xKey]) + i}>
                  {bars.map((bar, j) => {
                    const value = Number(row[bar.key] ?? 0);
                    const x = categoryX + j * (oneBarWidth + 6);
                    const y = yPos(value);
                    const h = pad.top + plotH - y;
                    return (
                      <rect
                        key={bar.key}
                        x={x}
                        y={y}
                        width={oneBarWidth}
                        height={h}
                        rx="6"
                        fill={colors[j % colors.length]}
                      />
                    );
                  })}
                  <text x={categoryX + totalBarWidth / 2} y={pad.top + plotH + 18} textAnchor="middle" fontSize="12" fill="#64748b">
                    {row[xKey]}
                  </text>
                </g>
              );
            })}
          </svg>
          <div className="flex flex-wrap gap-4 mt-3 text-sm text-slate-600">
            {bars.map((b, idx) => (
              <div key={b.key} className="flex items-center gap-2">
                <span className="inline-block w-4 h-3 rounded" style={{ background: colors[idx % colors.length] }}></span>
                <span>{b.label}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const [inputs, setInputs] = useState(INITIAL);
      const [tab, setTab] = useState("summary");

      const roadmap = useMemo(() => buildRoadmap(inputs), [inputs]);
      const currentYear = roadmap[0];
      const age65 = roadmap.find((r) => r.age === 65) || roadmap[roadmap.length - 1];
      const fullConvertYear = roadmap.find((r) => r.pretax < 50000)?.year;

      const compareScenarios = useMemo(() => {
        return [62, 67, 70].map((ssAge) => {
          const rows = buildRoadmap({ ...inputs, ssAge });
          const finalRow = rows[rows.length - 1];
          const totalConversion = rows.reduce((s, r) => s + r.recommended, 0);
          return {
            label: `SS ${ssAge}`,
            finalRoth: finalRow.roth,
            finalPretax: finalRow.pretax,
            totalConversion,
          };
        });
      }, [inputs]);

      const setNum = (key, value) => setInputs((s) => ({ ...s, [key]: value }));
      const setBool = (key, value) => setInputs((s) => ({ ...s, [key]: value }));

      return (
        <div className="mx-auto max-w-[1600px] p-6">
          <div className="mb-6">
            <h1 className="text-3xl font-semibold tracking-tight">Roth Roadmap Dashboard</h1>
            <p className="text-slate-600 mt-2 max-w-4xl">
              Build your baseline Roth roadmap first, then compare abroad mode and Social Security timing.
            </p>
          </div>

          <div className="grid grid-cols-1 xl:grid-cols-[360px_minmax(0,1fr)] gap-6">
            <div className="rounded-3xl border border-slate-200 shadow-sm p-5 h-fit xl:sticky xl:top-6 bg-white">
              <h2 className="text-lg font-semibold mb-4">Inputs</h2>
              <div className="space-y-4">
                <label className="block space-y-2">
                  <span className="text-sm font-medium text-slate-700">Strategy</span>
                  <select
                    value={inputs.conversionStrategy}
                    onChange={(e) => setInputs((s) => ({ ...s, conversionStrategy: e.target.value }))}
                    className="w-full rounded-xl border border-slate-300 px-3 py-2"
                  >
                    <option value="balanced">Balanced roadmap</option>
                    <option value="aca">ACA-preserving roadmap</option>
                    <option value="max">Max-conversion roadmap</option>
                  </select>
                </label>

                <div className="grid grid-cols-2 gap-4">
                  <NumberInput label="Current age" value={inputs.currentAge} onChange={(v) => setNum("currentAge", v)} />
                  <NumberInput label="Retire age" value={inputs.retireAge} onChange={(v) => setNum("retireAge", v)} />
                  <NumberInput label="Taxable" value={inputs.taxable} onChange={(v) => setNum("taxable", v)} />
                  <NumberInput label="Pre-tax" value={inputs.pretax} onChange={(v) => setNum("pretax", v)} />
                  <NumberInput label="Roth" value={inputs.roth} onChange={(v) => setNum("roth", v)} />
                  <NumberInput label="HSA" value={inputs.hsa} onChange={(v) => setNum("hsa", v)} />
                </div>

                <div className="grid grid-cols-2 gap-4">
                  <NumberInput label="Annual spend" value={inputs.annualSpend} onChange={(v) => setNum("annualSpend", v)} />
                  <NumberInput label="Reduced spend" value={inputs.reducedSpend} onChange={(v) => setNum("reducedSpend", v)} />
                  <NumberInput label="Passive income" value={inputs.passiveIncome} onChange={(v) => setNum("passiveIncome", v)} />
                  <NumberInput label="Business income" value={inputs.businessIncome} onChange={(v) => setNum("businessIncome", v)} />
                </div>

                <div className="grid grid-cols-2 gap-4">
                  <NumberInput label="Return %" value={inputs.annualReturn} onChange={(v) => setNum("annualReturn", v)} />
                  <NumberInput label="Inflation %" value={inputs.inflation} onChange={(v) => setNum("inflation", v)} />
                  <NumberInput label="SS age" value={inputs.ssAge} onChange={(v) => setNum("ssAge", v)} />
                  <NumberInput label="SS monthly" value={inputs.ssMonthly} onChange={(v) => setNum("ssMonthly", v)} />
                </div>

                <div className="grid grid-cols-2 gap-4">
                  <NumberInput label="Twins college age" value={inputs.collegeStart1} onChange={(v) => { setNum("collegeStart1", v); setNum("collegeStart2", v); }} />
                  <NumberInput label="Youngest college age" value={inputs.collegeStart3} onChange={(v) => setNum("collegeStart3", v)} />
                </div>
                <NumberInput label="College annual cost per child" value={inputs.collegeAnnualCost} onChange={(v) => setNum("collegeAnnualCost", v)} />

                <Toggle label="Preserve ACA subsidies" checked={inputs.preserveAca} onChange={(v) => setBool("preserveAca", v)} />
                <Toggle label="Use taxable assets to pay conversion tax" checked={inputs.useTaxableForConversionTax} onChange={(v) => setBool("useTaxableForConversionTax", v)} />
                <Toggle label="Compare abroad mode" checked={inputs.abroadMode} onChange={(v) => setBool("abroadMode", v)} />

                {inputs.abroadMode && (
                  <div className="grid grid-cols-2 gap-4">
                    <NumberInput label="Abroad start age" value={inputs.abroadStartAge} onChange={(v) => setNum("abroadStartAge", v)} />
                    <NumberInput label="Years abroad" value={inputs.abroadYears} onChange={(v) => setNum("abroadYears", v)} />
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-6">
              <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-4">
                <Card title="Recommended conversion this year" value={money(currentYear.recommended)} subtitle={currentYear.note} />
                <Card title="ACA-safe max" value={currentYear.acaSafeMax != null ? money(currentYear.acaSafeMax) : "N/A"} subtitle={currentYear.abroad === "Abroad" ? "ACA not modeled abroad." : "10k MAGI buffer included."} />
                <Card title="Tax-bracket max" value={money(currentYear.bracketMax)} subtitle={`Planning band: ${currentYear.bracket}`} />
                <Card title="Pre-tax left at 65" value={money(age65.pretax)} subtitle={`Roth at 65: ${money(age65.roth)}`} />
                <Card title="Estimated year mostly converted" value={fullConvertYear || "Beyond horizon"} subtitle={inputs.abroadMode ? "Includes abroad comparison logic." : "Baseline U.S. roadmap first."} />
              </div>

              <div className="flex flex-wrap gap-2">
                {[
                  ["summary", "Summary"],
                  ["roadmap", "Roadmap"],
                  ["abroad", "Abroad compare"],
                  ["ss", "SS timing"],
                ].map(([id, label]) => (
                  <button
                    key={id}
                    onClick={() => setTab(id)}
                    className={`px-4 py-2 rounded-2xl border ${tab === id ? "bg-slate-900 text-white border-slate-900" : "bg-white text-slate-700 border-slate-300"}`}
                  >
                    {label}
                  </button>
                ))}
              </div>

              {tab === "summary" && (
                <div className="space-y-6">
                  <div className="rounded-3xl border border-slate-200 shadow-sm p-5 bg-white">
                    <h2 className="text-lg font-semibold mb-4">Balance shift over time</h2>
                    <SimpleLineChart
                      data={roadmap}
                      xKey="age"
                      series={[
                        { key: "pretax", label: "Pre-tax" },
                        { key: "roth", label: "Roth" },
                        { key: "taxable", label: "Taxable" },
                      ]}
                      yFormatter={compact}
                      height={360}
                    />
                  </div>
                </div>
              )}

              {tab === "roadmap" && (
                <div className="space-y-6">
                  <div className="rounded-3xl border border-slate-200 shadow-sm p-5 bg-white">
                    <h2 className="text-lg font-semibold mb-4">Year-by-year recommended conversion</h2>
                    <SimpleBarChart
                      data={roadmap.slice(0, 20)}
                      xKey="age"
                      bars={[{ key: "recommended", label: "Recommended conversion" }]}
                      yFormatter={compact}
                      height={340}
                    />
                  </div>
                  <div className="rounded-3xl border border-slate-200 shadow-sm p-5 bg-white overflow-auto">
                    <h2 className="text-lg font-semibold mb-4">Roadmap table</h2>
                    <table className="w-full text-sm">
                      <thead>
                        <tr className="text-left border-b">
                          <th className="py-2 pr-4">Year</th>
                          <th className="py-2 pr-4">Age</th>
                          <th className="py-2 pr-4">Mode</th>
                          <th className="py-2 pr-4">ACA max</th>
                          <th className="py-2 pr-4">Bracket max</th>
                          <th className="py-2 pr-4">Recommended</th>
                          <th className="py-2 pr-4">Bracket</th>
                          <th className="py-2 pr-4">Note</th>
                        </tr>
                      </thead>
                      <tbody>
                        {roadmap.slice(0, 18).map((r) => (
                          <tr key={r.year} className="border-b align-top">
                            <td className="py-2 pr-4">{r.year}</td>
                            <td className="py-2 pr-4">{r.age}</td>
                            <td className="py-2 pr-4">{r.abroad}</td>
                            <td className="py-2 pr-4">{r.acaSafeMax != null ? money(r.acaSafeMax) : "N/A"}</td>
                            <td className="py-2 pr-4">{money(r.bracketMax)}</td>
                            <td className="py-2 pr-4 font-medium">{money(r.recommended)}</td>
                            <td className="py-2 pr-4">{r.bracket}</td>
                            <td className="py-2 pr-4 text-slate-500">{r.note}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {tab === "abroad" && (
                <div className="space-y-6">
                  <div className="rounded-3xl border border-slate-200 shadow-sm p-5 bg-white text-sm text-slate-600">
                    This comparison helps show whether a period abroad materially widens your Roth conversion lane after the baseline U.S. roadmap is built.
                  </div>
                  <div className="rounded-3xl border border-slate-200 shadow-sm p-5 bg-white">
                    <h2 className="text-lg font-semibold mb-4">Conversion headroom comparison</h2>
                    <SimpleLineChart
                      data={roadmap.slice(0, 20)}
                      xKey="age"
                      series={[
                        { key: "recommended", label: "Recommended conversion" },
                        { key: "acaSafeMax", label: "ACA-safe max", dashed: true },
                        { key: "bracketMax", label: "Tax-bracket max", dashed: true },
                      ]}
                      yFormatter={compact}
                      height={360}
                    />
                  </div>
                </div>
              )}

              {tab === "ss" && (
                <div className="space-y-6">
                  <div className="rounded-3xl border border-slate-200 shadow-sm p-5 bg-white text-sm text-slate-600">
                    Compare claiming at 62, 67, or 70 after the roadmap is already defined to see the downstream effect on Roth accumulation and remaining pre-tax balances.
                  </div>
                  <div className="rounded-3xl border border-slate-200 shadow-sm p-5 bg-white">
                    <h2 className="text-lg font-semibold mb-4">Claiming age comparison</h2>
                    <SimpleBarChart
                      data={compareScenarios}
                      xKey="label"
                      bars={[
                        { key: "finalRoth", label: "Projected Roth" },
                        { key: "finalPretax", label: "Projected pre-tax" },
                      ]}
                      yFormatter={compact}
                      height={320}
                    />
                    <div className="overflow-auto mt-6">
                      <table className="w-full text-sm">
                        <thead>
                          <tr className="text-left border-b">
                            <th className="py-2 pr-4">Scenario</th>
                            <th className="py-2 pr-4">Total converted</th>
                            <th className="py-2 pr-4">Ending Roth</th>
                            <th className="py-2 pr-4">Ending pre-tax</th>
                          </tr>
                        </thead>
                        <tbody>
                          {compareScenarios.map((r) => (
                            <tr key={r.label} className="border-b">
                              <td className="py-2 pr-4">{r.label}</td>
                              <td className="py-2 pr-4">{money(r.totalConversion)}</td>
                              <td className="py-2 pr-4">{money(r.finalRoth)}</td>
                              <td className="py-2 pr-4">{money(r.finalPretax)}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
